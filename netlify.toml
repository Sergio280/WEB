[build]
  functions = "netlify/functions"

[[headers]]
  for = "/*.exe"
  [headers.values]
    Content-Type = "application/octet-stream"
    Content-Disposition = "attachment"

# ── Culqi (activo) ────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/api/culqi-charge"
  to     = "/.netlify/functions/culqi-charge"
  status = 200

[[redirects]]
  from   = "/api/culqi-subscription"
  to     = "/.netlify/functions/culqi-subscription"
  status = 200

[[redirects]]
  from   = "/api/culqi-webhook"
  to     = "/.netlify/functions/culqi-webhook"
  status = 200

[[redirects]]
  from   = "/api/admin-create-license"
  to     = "/.netlify/functions/admin-create-license"
  status = 200

# ── Mercado Pago (legacy — mantener hasta migración completa) ─────────────────
[[redirects]]
  from   = "/api/create-preference"
  to     = "/.netlify/functions/create-preference"
  status = 200

[[redirects]]
  from   = "/api/webhook"
  to     = "/.netlify/functions/webhook"
  status = 200
