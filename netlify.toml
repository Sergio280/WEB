[build]
  functions = "netlify/functions"

# ── Headers de seguridad globales ─────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ── Descarga de ejecutables ────────────────────────────────────────────────────
[[headers]]
  for = "/*.exe"
  [headers.values]
    Content-Type = "application/octet-stream"
    Content-Disposition = "attachment"

[[headers]]
  for = "/update/*.exe"
  [headers.values]
    Content-Type = "application/octet-stream"
    Content-Disposition = "attachment"

[[headers]]
  for = "/update/*.zip"
  [headers.values]
    Content-Type = "application/octet-stream"
    Content-Disposition = "attachment"

# ── Rutas API (Culqi) ─────────────────────────────────────────────────────────
[[redirects]]
  from   = "/api/culqi-charge"
  to     = "/.netlify/functions/culqi-charge"
  status = 200

[[redirects]]
  from   = "/api/culqi-subscription"
  to     = "/.netlify/functions/culqi-subscription"
  status = 200

[[redirects]]
  from   = "/api/culqi-webhook"
  to     = "/.netlify/functions/culqi-webhook"
  status = 200

[[redirects]]
  from   = "/api/admin-create-license"
  to     = "/.netlify/functions/admin-create-license"
  status = 200
