[build]
  # La landing nueva (React/Vite) vive en app-v2 y se compila a /v2.
  # El build corre dentro de app-v2 (vite emite a ../dist/v2) y luego
  # copy-legacy copia el sitio estático actual (index.html, páginas legales,
  # /icono, /update) a la raíz de dist/. Así "/" sigue sirviéndose intacto y la
  # nueva landing queda en "/v2".
  # NOTA: no se usa `base` para que `publish` y `functions` se resuelvan desde
  # la raíz del repo (donde realmente viven dist/ y netlify/functions).
  command   = "cd app-v2 && npm install && npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# ── Función programada: reporta activaciones reales a Google Ads ───────────────
# Cada hora busca activaciones nuevas del plugin (users_v2/.../activations) y las
# sube como conversiones offline para que Ads optimice por instalaciones reales
# y no por registros de formulario. Idempotente (marca adsConversionSent).
[functions."report-activations"]
  schedule = "@hourly"

# ── Función programada: secuencia de correos del trial (días 3/7/12) ──────────
# Una vez al día revisa los trials vigentes y envía el correo de seguimiento que
# corresponda a su etapa (Resend). El correo de bienvenida (día 0) lo manda
# create-trial-license.js al registrarse. Idempotente (marca trialMeta.nurture).
[functions."trial-nurture"]
  schedule = "@daily"

# ── Geolocalización por IP (idioma automático de la landing) ──────────────────
# Edge function que devuelve el país del visitante (context.geo) en /api/geo.
# La landing /v2 la usa para mostrar la página en inglés fuera de países
# hispanohablantes en la primera visita.
[[edge_functions]]
  path     = "/api/geo"
  function = "geo"

# ── Headers de seguridad globales ─────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # CSP: defensa en profundidad contra XSS. Allowlist de recursos que el
    # sitio carga hoy:
    #   script-src: GA4 (googletagmanager, google-analytics), Clarity,
    #     Turnstile, Culqi checkout (checkout.culqi.com — NO js.culqi.com),
    #     jsDelivr (anime.js, chart.js).
    #   frame-src: Turnstile, Culqi secure popup, YouTube embeds.
    #   connect-src: GA4, Clarity, Firebase RTDB, Identity Toolkit, Turnstile,
    #     Culqi API.
    #   img-src 'https:': YouTube thumbnails (i.ytimg.com) + datos en general.
    # 'unsafe-inline' se mantiene porque GA4/Clarity y la propia index.html
    # usan scripts/styles inline; sustituible por nonce/hash si en el futuro
    # se elimina todo inline.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://www.clarity.ms https://*.clarity.ms https://challenges.cloudflare.com https://checkout.culqi.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; frame-src https://challenges.cloudflare.com https://secure.culqi.com https://www.youtube.com https://www.youtube-nocookie.com; connect-src 'self' https://www.google-analytics.com https://*.google-analytics.com https://*.clarity.ms https://bims-8d507-default-rtdb.firebaseio.com https://identitytoolkit.googleapis.com https://challenges.cloudflare.com https://api.culqi.com; object-src 'none'; base-uri 'self'; form-action 'self' https://secure.culqi.com;"

# ── Descarga de ejecutables ────────────────────────────────────────────────────
[[headers]]
  for = "/*.exe"
  [headers.values]
    Content-Type = "application/octet-stream"
    Content-Disposition = "attachment"

[[headers]]
  for = "/update/*.exe"
  [headers.values]
    Content-Type = "application/octet-stream"
    Content-Disposition = "attachment"

[[headers]]
  for = "/update/*.zip"
  [headers.values]
    Content-Type = "application/octet-stream"
    Content-Disposition = "attachment"

# ── Rutas API (Culqi) ─────────────────────────────────────────────────────────
[[redirects]]
  from   = "/api/culqi-charge"
  to     = "/.netlify/functions/culqi-charge"
  status = 200

[[redirects]]
  from   = "/api/culqi-subscription"
  to     = "/.netlify/functions/culqi-subscription"
  status = 200

[[redirects]]
  from   = "/api/culqi-webhook"
  to     = "/.netlify/functions/culqi-webhook"
  status = 200

# ── Pasarela internacional (Lemon Squeezy) ────────────────────────────────────
# El checkout usa enlaces hospedados buy/{slug} directo desde el frontend (sin
# API key en el servidor → evita el límite de 4 KB de env vars). Solo el webhook
# es server-side.
[[redirects]]
  from   = "/api/lemonsqueezy-webhook"
  to     = "/.netlify/functions/lemonsqueezy-webhook"
  status = 200

[[redirects]]
  from   = "/api/admin-create-license"
  to     = "/.netlify/functions/admin-create-license"
  status = 200

# ── Endpoint público: registro de trial 14 días ───────────────────────────────
[[redirects]]
  from   = "/api/trial"
  to     = "/.netlify/functions/create-trial-license"
  status = 200

# ── Veredicto de licencia firmado (lo consume el plugin) ──────────────────────
[[redirects]]
  from   = "/api/verify-license"
  to     = "/.netlify/functions/verify-license"
  status = 200

# ── Telemetría de uso (privacy-safe) para calibrar políticas del trial ────────
[[redirects]]
  from   = "/api/usage"
  to     = "/.netlify/functions/usage-event"
  status = 200

# ── Proxy de Firebase para redes que bloquean Google (plugin 1.1.5+) ──────────
# El plugin intenta Google directo y, si el firewall corporativo lo bloquea,
# reintenta contra estas rutas, que reenvían a Google desde Netlify (fuera del
# firewall). :splat conserva el resto del path (incl. los ':' de los métodos de
# identitytoolkit y el .json de la RTDB). El query (?key / ?auth) lo maneja la
# función vía event.rawUrl. Ver netlify/functions/_lib/proxy-core.js.
[[redirects]]
  from   = "/api/gauth/*"
  to     = "/.netlify/functions/gauth-proxy/:splat"
  status = 200

[[redirects]]
  from   = "/api/gdb/*"
  to     = "/.netlify/functions/gdb-proxy/:splat"
  status = 200

# ── Redirige el dominio ANTIGUO al nuevo (SEO + marca) ────────────────────────
# Afecta SOLO al host bimsapp.netlify.app. Por el ORDEN de las reglas, las de
# /api/* de arriba (status 200) se evalúan PRIMERO y NO se redirigen, así que las
# llamadas de licencia y trial de los plugins YA INSTALADOS se siguen sirviendo
# en netlify.app sin redirección. Las visitas humanas y los crawlers van 301 a
# bimsaddin.com. Los Deploy Previews (deploy-preview-N--bimsapp.netlify.app) NO
# se ven afectados porque el host del `from` es el de producción exacto.
[[redirects]]
  from   = "https://bimsapp.netlify.app/*"
  to     = "https://bimsaddin.com/:splat"
  status = 301
  force  = true
